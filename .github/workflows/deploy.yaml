# .github/workflows/deploy.yml
name: Build & Deploy to DOKS

on:
  push:
    branches:
      - staging

env:
  REGISTRY: registry.digitalocean.com/escrow-mobileapp-registry
  IMAGE_NAME: voting-system-test

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 𞷳 Checkout code
        uses: actions/checkout@v3

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to DOCR
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 📆 Define Short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::5}" >> $GITHUB_ENV

      - name: 📦 Build and push image
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME:$SHORT_SHA .
          docker push $REGISTRY/$IMAGE_NAME:$SHORT_SHA

      - name: 🔧 Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: 🔐 Set up doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: 📡 Configure Kubeconfig
        run: doctl kubernetes cluster kubeconfig save k8s-1-33-1-do-0-ams3-1750860810270

      - name: 📏 Replace image tag in deployment
        run: |
          sed -i "s/{{IMAGE_TAG}}/$SHORT_SHA/g" k8s/deployment.yaml

      - name: 🚀 Deploy to DOKS
        run: |
          kubectl -n testing apply -f k8s/deployment.yaml
          kubectl -n testing apply -f k8s/service.yaml
          kubectl -n testing apply -f k8s/ingress.yaml
